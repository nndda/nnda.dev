name: Deploy to CF Pages


on:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches:
      - main
      - dev
    paths:
      - '**/*.py'
      - '**/*.ts'
      - '**/*.js'
      - '**/*.scss'
      - '**/*.hbs'
      - 'src/'
      - '.github/workflows/deploy.yml'
      - 'bun.lock'
      - 'package.json'
      - 'config/tsconfig.*.json'
      - 'config/webpack.common.ts'
      - 'config/webpack.config.ts'
      - 'config/wrangler.toml'
      - 'config/requirements.txt'
  workflow_dispatch:


jobs:
  check-pip:
    name: Check pip/requirements.txt

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            config/requirements.txt
          sparse-checkout-cone-mode: false

      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: config/requirements.txt


  check-bun:
    name: Check Bun/package.json

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions/setup-bun/action.yml
            bun.lock
            package.json
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/setup-bun
        with:
          cache: no
          install-deps: no

      - name: Audit Bun dependencies
        run: |
          bun audit --audit-level moderate


  deploy:
    name: Deploy to Cloudflare

    runs-on: ubuntu-latest

    needs:
      - check-bun
      - check-pip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/setup-bun

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: 'config/requirements.txt'
      - name: Install Python dependencies
        run: pip install -r ./config/requirements.txt

      - name: Build website
        run: bun run build && cp ./config/wrangler.toml ./
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_PAT_EXT: ${{ secrets.GH_PAT_EXT }}
          SITE_EXT: ${{ secrets.SITE_EXT }}
          COMMIT_SHA: ${{ github.sha }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --commit-dirty=true
