name: ESLint

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '.github/workflows/lint-scripts.yml'
      - 'config/eslint.config.mjs'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '**/*.js'
      - '.github/workflows/lint-scripts.yml'
      - 'config/eslint.config.mjs'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - uses: ./.github/actions/setup-bun

      - name: Lint scripts
        run: bun run lint:scripts
